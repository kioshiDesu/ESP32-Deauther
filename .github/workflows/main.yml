name: Build ESP32-Deauther Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run

      - name: Install esptool for merging
        run: pip install esptool

      - name: Locate build artifacts
        id: find_build
        run: |
          # Find the bootloader.bin file and get its directory
          BUILD_DIR=$(find .pio/build -name "bootloader.bin" -printf "%h\n" | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "Build directory not found!"
            exit 1
          fi
          echo "build_dir=$BUILD_DIR" >> $GITHUB_OUTPUT
          echo "Found build dir: $BUILD_DIR"

      - name: Upload separate binaries
        uses: actions/upload-artifact@v4
        with:
          name: esp32-deauther-firmware-separate
          path: |
            ${{ steps.find_build.outputs.build_dir }}/bootloader.bin
            ${{ steps.find_build.outputs.build_dir }}/partitions.bin
            ${{ steps.find_build.outputs.build_dir }}/firmware.bin
          # The action will skip missing files (they'll be missing from the zip) and not fail.

      - name: Merge binaries into a single image
        run: |
          BUILD_DIR="${{ steps.find_build.outputs.build_dir }}"
          # Check if partitions.bin exists; if not, use a default offset? But ESP32 always needs one.
          if [ ! -f "$BUILD_DIR/partitions.bin" ]; then
            echo "Warning: partitions.bin not found. Creating a default one from board profile might be needed."
            # We'll still try to merge without it? Better to fail.
            exit 1
          fi
          esptool.py --chip esp32 merge_bin \
            -o "$BUILD_DIR/full_image.bin" \
            0x1000 "$BUILD_DIR/bootloader.bin" \
            0x8000 "$BUILD_DIR/partitions.bin" \
            0x10000 "$BUILD_DIR/firmware.bin"

      - name: Upload merged image
        uses: actions/upload-artifact@v4
        with:
          name: esp32-deauther-firmware-merged
          path: ${{ steps.find_build.outputs.build_dir }}/full_image.bin
