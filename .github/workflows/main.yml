- name: Upload all binaries
  uses: actions/upload-artifact@v4
  with:
    name: esp32-deauther-full-build
    path: |
      .pio/build/*/bootloader.bin
      .pio/build/*/partitions.bin
      .pio/build/*/firmware.bin

- name: Install esptool
  run: pip install esptool

- name: Merge binaries
  run: |
    # Adjust paths if your build directory name differs
    cd .pio/build/*
    esptool.py --chip esp32 merge_bin -o full_image.bin \
      0x1000 bootloader.bin \
      0x8000 partitions.bin \
      0x10000 firmware.bin

- name: Upload merged image
  uses: actions/upload-artifact@v4
  with:
    name: esp32-deauther-merged
    path: .pio/build/*/full_image.bin
